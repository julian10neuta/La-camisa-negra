version: '3.8'
services:

  postgres_db:
    image: postgres:15-alpine
    container_name: la_camisa_negra_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: la_camisa_negra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  redis_cache:
    image: redis:7-alpine
    container_name: la_camisa_negra_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network

  chroma_db:
    image: chromadb/chroma:latest
    container_name: la_camisa_negra_chroma
    restart: always
    environment:
      - IS_PERSISTENT=TRUE
    ports:
      - "8003:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - app_network

  authentication_service:
    build:
      context: ./backend
      dockerfile: authentication_service/Dockerfile
    container_name: la_camisa_negra_auth
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./backend/authentication_service:/app/authentication_service
      - ./backend/shared:/app/shared
      - ./backend/migrations:/app/migrations
    depends_on:
      - postgres_db
    networks:
      - app_network

  api_gateway:
    build:
      context: ./backend
      dockerfile: api_gateway/Dockerfile
    container_name: la_camisa_negra_gateway
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/api_gateway:/app/api_gateway
      - ./backend/shared:/app/shared
    depends_on:
      - postgres_db
      - redis_cache
      - authentication_service
    networks:
      - app_network

  music_service:
    build:
      context: ./backend
      dockerfile: music_service/Dockerfile
    container_name: la_camisa_negra_music
    restart: always
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      - ./backend/music_service:/app/music_service
      - ./backend/shared:/app/shared
    depends_on:
      - postgres_db
      - redis_cache
      - authentication_service
    networks:
      - app_network

  recommendation_service:
    build:
      context: ./backend
      dockerfile: recommendation_service/Dockerfile
    container_name: la_camisa_negra_recommendation
    restart: always
    ports:
      - "8004:8004"
    env_file:
      - .env
    volumes:
      - ./backend/recommendation_service:/app/recommendation_service
      - ./backend/shared:/app/shared
    depends_on:
      - postgres_db
      - redis_cache
      - authentication_service
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  app_network:
    driver: bridge