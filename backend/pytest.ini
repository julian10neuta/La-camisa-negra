[pytest]
# Raíz de importación: backend/ va al sys.path para que los tests puedan hacer
# `import shared...`, `import music_service...`, etc. igual que los servicios en
# tiempo de ejecución (que corren con PYTHONPATH=/app == backend/).
pythonpath = .

# Dónde viven los tests.
testpaths = tests

# El código async (composer, engine, routers) se testea sin decorar cada test:
# pytest-asyncio en modo automático trata como corrutina cualquier `async def test_`.
asyncio_mode = auto

# -q = salida compacta. --strict-markers = un marcador mal escrito es error, no
# aviso silencioso.
addopts = -q --strict-markers

markers =
    integration: test que cruza una frontera (BD SQLite en memoria, TestClient, mocks de red).

# Silenciamos las DeprecationWarning: NO son de los tests, sino deuda técnica ya
# conocida del código de la app (pydantic `class Config`, sqlalchemy
# declarative_base, datetime.utcnow, redis setex) y de librerías (el TestClient de
# FastAPI). Ensucian la salida sin decir nada del resultado. Si algún día se
# moderniza ese código, basta con quitar esta línea para volver a verlas.
filterwarnings =
    ignore::DeprecationWarning
    ignore:Using .httpx. with .starlette.testclient. is deprecated
